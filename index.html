<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Armando Barber Shop</title>

<style>

/* RESET */
body,html{
margin:0;
padding:0;
background:#000;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
opacity:1;
transition:opacity 0.6s;
}

#loader.fade{
opacity:0;
}

#loader img{
width:260px;
animation:zoom 3s infinite;
}

@keyframes zoom{
0%{transform:scale(0.9);}
50%{transform:scale(1.1);}
100%{transform:scale(0.9);}
}

.loader-bar{
width:200px;
height:6px;
background:#333;
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

.loader-bar span{
display:block;
height:100%;
width:0%;
background:#D4AF37;
animation:loading 3s forwards;
}

@keyframes loading{
0%{width:0}
100%{width:100%}
}

/* BODY */
body{
font-family:Arial;
color:#ddd;
text-align:center;
padding:20px;
}

/* TITULO */
.titulo{
font-size:36px;
letter-spacing:4px;
background:linear-gradient(90deg,#D4AF37,#fff,#D4AF37);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 4s infinite;
}

@keyframes shine{
0%{background-position:-200%}
100%{background-position:200%}
}

/* FORM */
#form-container{
max-width:420px;
margin:auto;
padding:20px;
background:#111;
border-radius:12px;
}

/* INPUTS */
select,input{
width:90%;
padding:12px;
margin:10px;
border:none;
border-radius:6px;
background:#000;
color:#FFD700;
}

/* BUTTON */
button{
background:#D4AF37;
color:#000;
padding:12px;
border:none;
border-radius:10px;
width:90%;
margin-top:10px;
}

</style>
</head>

<body>

<div id="loader">
<img src="https://i.imgur.com/hLIKU5R.jpeg">
<div class="loader-bar"><span></span></div>
</div>

<div class="titulo">ARMANDO BARBER SHOP</div>

<div id="form-container">

<select id="barbeiro">
<option>David</option>
<option>Armando</option>
</select>

<select id="servico">
<option>Corte</option>
<option>Barba</option>
<option>Corte e Barba</option>
</select>

<input type="date" id="data">
<select id="hora"></select>

<input type="text" id="nome" placeholder="Nombre">
<input type="tel" id="telefono" placeholder="WhatsApp">

<button onclick="agendar()">Reservar</button>

</div>

<script>

// 🔥 TU LINK YA FIJO
const URL = "https://script.google.com/macros/s/AKfycbxYn9wIO7bEed7-9K0T8mdD4wXYFBFsxRroWSQDfCNEHWxb7KxRg1P_iSgTgcR6LZ6H/exec";

// LOADER
window.onload = ()=>{
setTimeout(()=>{
document.getElementById("loader").classList.add("fade");
setTimeout(()=>{document.getElementById("loader").style.display="none"},600);
},3000);
};

// CARGAR HORAS
document.getElementById("data").addEventListener("change", cargar);

async function cargar(){

let data = document.getElementById("data").value;
let barber = document.getElementById("barbeiro").value;

let res = await fetch(URL + "?reservas=1");
let datos = await res.json();

let horas = ["08:30","09:00","09:30","10:00","10:30","11:00","11:30","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00","18:30","19:00","19:30","20:00"];

let select = document.getElementById("hora");
select.innerHTML = "";

horas.forEach(h=>{

let ocupado = datos.some(r=>r.data===data && r.hora===h && r.barbero===barber);

let op = document.createElement("option");
op.value = h;
op.textContent = ocupado ? h+" (ocupado)" : h;

if(ocupado) op.disabled = true;

select.appendChild(op);

});

}

// AGENDAR
async function agendar(){

let data = document.getElementById("data").value;
let hora = document.getElementById("hora").value;
let nome = document.getElementById("nome").value;
let telefono = document.getElementById("telefono").value;
let servico = document.getElementById("servico").value;
let barber = document.getElementById("barbeiro").value;

if(!data || !hora || !nome || !telefono){
alert("Preencha tudo");
return;
}

await fetch(URL,{
method:"POST",
body: JSON.stringify({
data:data,
hora:hora,
cliente:nome,
telefono:telefono,
servicio:servico,
barbero:barber
})
});

// WhatsApp
let msg = `Olá, meu nome é ${nome}. Quero ${servico} com ${barber} dia ${data} às ${hora}`;
window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(msg)}`);

alert("Reserva guardada");

cargar();

}

</script>

</body>
</html>
