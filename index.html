<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armando Barber Shop</title>

<style>

/* RESET (IMPORTANTE PARA QUITAR FONDO BLANCO) */
body,html{
margin:0;
padding:0;
background:#000;
}

/* PANTALLA DE CARGA */
#loader{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
}

#loader img{
width:280px;
animation:giro 4s linear infinite;
}

@keyframes giro{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.loader-bar{
width:200px;
height:6px;
background:#333;
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

.loader-bar span{
display:block;
height:100%;
width:0%;
background:#D4AF37;
animation:loading 2s forwards;
}

@keyframes loading{
0%{width:0}
100%{width:100%}
}

/* BODY */
body{
font-family:Arial, sans-serif;
color:#ddd;
text-align:center;
padding:20px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

/* TITULO */
.titulo{
font-size:36px;
font-weight:bold;
letter-spacing:4px;
margin-bottom:10px;
background:linear-gradient(90deg,#D4AF37,#fff,#D4AF37);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 4s linear infinite;
}

@keyframes shine{
0%{background-position:-200%}
100%{background-position:200%}
}

/* FORMULARIO */
#form-container{
position:relative;
max-width:420px;
margin:auto;
padding:25px;
border-radius:14px;
background:#111;
box-shadow:0 0 25px rgba(212,175,55,0.25);
overflow:hidden;
}

/* LOGO FONDO */
#form-container::before{
content:"";
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
width:130%;
height:130%;
background-image:url("https://i.imgur.com/hLIKU5R.jpeg");
background-size:contain;
background-repeat:no-repeat;
background-position:center;
opacity:0.10;
z-index:0;
}

#form-container form,
#confirmacao{
position:relative;
z-index:1;
}

/* BARBEROS */
.barbeiros{
display:flex;
justify-content:center;
gap:20px;
margin:10px 0 20px 0;
}

.card{
background:#000;
border-radius:10px;
padding:10px;
width:110px;
cursor:pointer;
transition:0.3s;
border:2px solid transparent;
}

.card img{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
}

.card span{
display:block;
margin-top:6px;
}

.card:hover{
transform:scale(1.05);
}

.card.active{
border:2px solid #D4AF37;
}

/* CAMPOS */
label{
display:block;
margin:10px 0 5px;
font-weight:bold;
}

select,input{
width:90%;
padding:12px;
margin-bottom:10px;
border-radius:6px;
border:none;
background:#000;
color:#FFD700;
font-size:16px;
}

input[type="date"]{
color:#FFD700;
background:#000;
}

/* BOTONES */
button{
background:#D4AF37;
color:#000;
border:none;
padding:12px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
width:90%;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* MENSAJE */
#confirmacao{
display:none;
margin-top:15px;
color:#00ff7f;
font-weight:bold;
}

</style>
</head>

<body>

<!-- LOADER BONITO -->
<div id="loader">
  <img src="https://i.imgur.com/hLIKU5R.jpeg">
  <div class="loader-bar">
    <span></span>
  </div>
</div>

<div class="titulo">ARMANDO BARBER SHOP</div>

<p>Segunda a Sábado<br>8:30–11:30 | 13:00–20:00</p>

<div id="form-container">

<form>

<label>💈 Escolha o Barbeiro</label>

<div class="barbeiros">

<div class="card active" onclick="selecionarBarbeiro('David',this)">
<img src="https://i.imgur.com/QYKPKZ2.jpg">
<span>David</span>
</div>

<div class="card" onclick="selecionarBarbeiro('Armando',this)">
<img src="https://i.imgur.com/JVUmj2q.jpg">
<span>Armando</span>
</div>

</div>

<input type="hidden" id="barbeiro" value="David">

<label>Serviço</label>

<select id="servico">
<option value="Corte">Corte - R$40</option>
<option value="Barba">Barba - R$30</option>
<option value="Sobrancelha">Sobrancelha - R$10</option>
<option value="Corte e Barba">Corte e Barba - R$70</option>
</select>

<label>📅 Data</label>
<input type="date" id="data" required>

<label>⏰ Hora</label>
<select id="hora"></select>

<label>👤 Nome</label>
<input type="text" id="nome" placeholder="Seu nome" required>

<label>📱 WhatsApp</label>
<input type="tel" inputmode="numeric" id="telefone" placeholder="Ex: 4734354016" required>

<button type="button" onclick="agendar()">Agendar</button>
<button type="button" onclick="abrirMaps()">📍 Ver localização</button>

</form>

<div id="confirmacao" style="display:none;">
Reserva enviada com sucesso! Obrigado por nos preferir.
</div>

</div>

<script>

(function(){

"use strict";

/* CONFIG */
const API_URL = "https://script.google.com/macros/s/AKfycbztv0Kjze9NPhvUBXgkD0ROj_kvRZOrOq2a9hNkn4tzVIPQ0LB3oT3wFSycJTRRGucn/exec";

/* LOADER */
window.addEventListener("load", function(){
  setTimeout(function(){
    var loader = document.getElementById("loader");
    if(loader){
      loader.style.display = "none";
    }
  }, 1200);
});

/* FECHA MINIMA */
window.addEventListener("load", function(){
  var hoy = new Date().toISOString().split("T")[0];
  document.getElementById("data").min = hoy;
});

/* HORAS */
var HORAS = [
"08:30","09:00","09:30",
"10:00","10:30","11:00",
"13:00","13:30","14:00",
"14:30","15:00","15:30",
"16:00","16:30","17:00",
"17:30","18:00","18:30",
"19:00","19:30","20:00"
];

/* SELECCIONAR BARBERO */
window.selecionarBarbeiro = function(nome, el){
  document.getElementById("barbeiro").value = nome.trim();

  var cards = document.querySelectorAll(".card");
  for(var i=0;i<cards.length;i++){
    cards[i].classList.remove("active");
  }

  el.classList.add("active");

  carregarHoras();
};

/* CARGAR HORAS */
async function carregarHoras(){

  if(window.carregandoHoras) return;
window.carregandoHoras = true;
  
  var data = document.getElementById("data").value;  
  var barbeiro = document.getElementById("barbeiro").value.trim();  
  var select = document.getElementById("hora");  
  
  select.innerHTML = "";  
  
    if(!data || !barbeiro){
  window.carregandoHoras = false;
  return;
}
  
  var ocupados = [];
  
  try{  
    var res = await fetch(
  API_URL +
  "?reservas=1" +
  "&data=" + data +
  "&barbero=" + encodeURIComponent(barbeiro)
);
    var datos = await res.json();  
  
    for(var i=0;i<datos.length;i++){  
      var d = String(datos[i].data).trim();  
      var h = String(datos[i].hora).trim();  
      var b = String(datos[i].barbero).trim();  
  
  if(
  (
    d === data ||
    d === "TODOS"
  ) &&
  b === barbeiro
){
  
  var status = "";  
  
  if(datos[i].status){  
    status = String(datos[i].status).trim().toLowerCase();  
  }  
  
  // si está cancelado, no bloquear  
  if(status.includes("cancelado")){  
    continue;  
  }  
  
  // bloquear si está confirmado o bloqueado  
  ocupados.push(h);  
  
      }  
    }  
  
  }catch(e){  
    console.log("Erro API", e);
  }  
  
  var ahora = new Date();  
  var hoy = ahora.toISOString().split("T")[0];  
  var horaActual =  
String(ahora.getHours()).padStart(2,'0') +  
":" +  
String(ahora.getMinutes()).padStart(2,'0');  
  
  for(var i=0;i<HORAS.length;i++){  
  
    var h = HORAS[i];  
    var opt = document.createElement("option");  
  
    opt.value = h;  
    opt.text = h;  
  
    if(ocupados.indexOf(h) !== -1){  
      opt.disabled = true;  
      opt.text = h + " (ocupado)";  
    }  
  
    if(data === hoy && h <= horaActual){  
      opt.disabled = true;  
      opt.text = h + " (passou)";  
    }  
  
    select.add(opt);  
  }
  window.carregandoHoras = false;
}

/* EVENTO FECHA */
document.addEventListener("DOMContentLoaded", function(){
  setTimeout(carregarHoras, 100);
  document.getElementById("data").addEventListener("change", carregarHoras);
});

/* AGENDAR */
window.agendar = function(){

  var data = document.getElementById("data").value;
  var hora = document.getElementById("hora").value;
  var nome = document.getElementById("nome").value;
  var telefono = document.getElementById("telefone").value;
  var barbeiro = document.getElementById("barbeiro").value.trim();
  var servico = document.getElementById("servico").value;

  if(!data || !hora || !nome || !telefono){
    alert("Preencha todos os campos");
    return;
  }

  var texto =
  "Olá Armando Barber Shop%0A%0A" +
  "Quero agendar um horário%0A%0A" +
  "Barbeiro: " + barbeiro + "%0A" +
  "Serviço: " + servico + "%0A" +
  "Data: " + data + "%0A" +
  "Hora: " + hora + "%0A" +
  "Nome: " + nome;

  window.open("https://wa.me/554734354016?text=" + texto);

  fetch(API_URL,{
  method:"POST",
  body: new URLSearchParams({
    data: data,
    hora: hora,
    cliente: nome,
    telefone: telefono,
    servico: servico,
    barbeiro: barbeiro
  })
})
.then(response => response.text())
.then(() => {

  // guardar estado de confirmación
  localStorage.setItem("ultima_reserva", "ok");

  // mostrar mensaje inmediatamente
  let msg = document.getElementById("confirmacao");

  if(msg){
    msg.style.display = "block";
    msg.innerHTML =
    "Reserva enviada com sucesso! Obrigado por nos preferir.";
  }
  
  // limpiar campos
document.getElementById("nome").value = "";
document.getElementById("telefone").value = "";
document.getElementById("servico").value = "";
document.getElementById("hora").value = "";

  // recargar horas después de guardar
  setTimeout(() => {
    carregarHoras();
  }, 1500);

})
.catch(() => {
  alert("Erro ao salvar reserva");
});

};

/* MAPS */
window.abrirMaps = function(){
  window.open("https://maps.app.goo.gl/PeCnFTVfxGxvAyP48");
};

})();

window.addEventListener("load", function(){

  let msg = document.getElementById("confirmacao");

  // ocultar mensaje siempre al entrar a la página
  if(msg){
    msg.style.display = "none";
  }

  // limpiar cualquier estado anterior
  localStorage.removeItem("ultima_reserva");

});

</script>

</body>
</html>
