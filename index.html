<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armando Barber Shop</title>

<style>

/* RESET (IMPORTANTE PARA QUITAR FONDO BLANCO) */
body,html{
margin:0;
padding:0;
background:#000;
}

/* PANTALLA DE CARGA */
#loader{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
}

#loader img{
width:280px;
animation:giro 4s linear infinite;
}

@keyframes giro{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.loader-bar{
width:200px;
height:6px;
background:#333;
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

.loader-bar span{
display:block;
height:100%;
width:0%;
background:#D4AF37;
animation:loading 2s forwards;
}

@keyframes loading{
0%{width:0}
100%{width:100%}
}

/* BODY */
body{
font-family:Arial, sans-serif;
color:#ddd;
text-align:center;
padding:20px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

/* TITULO */
.titulo{
font-size:36px;
font-weight:bold;
letter-spacing:4px;
margin-bottom:10px;
background:linear-gradient(90deg,#D4AF37,#fff,#D4AF37);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 4s linear infinite;
}

@keyframes shine{
0%{background-position:-200%}
100%{background-position:200%}
}

/* FORMULARIO */
#form-container{
position:relative;
max-width:420px;
margin:auto;
padding:25px;
border-radius:14px;
background:#111;
box-shadow:0 0 25px rgba(212,175,55,0.25);
overflow:hidden;
}

/* LOGO FONDO */
#form-container::before{
content:"";
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
width:130%;
height:130%;
background-image:url("https://i.imgur.com/hLIKU5R.jpeg");
background-size:contain;
background-repeat:no-repeat;
background-position:center;
opacity:0.10;
z-index:0;
}

#form-container form,
#confirmacao{
position:relative;
z-index:1;
}

/* BARBEROS */
.barbeiros{
display:flex;
justify-content:center;
gap:20px;
margin:10px 0 20px 0;
}

.card{
background:#000;
border-radius:10px;
padding:10px;
width:110px;
cursor:pointer;
transition:0.3s;
border:2px solid transparent;
}

.card img{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
}

.card span{
display:block;
margin-top:6px;
}

.card:hover{
transform:scale(1.05);
}

.card.active{
border:2px solid #D4AF37;
}

/* CAMPOS */
label{
display:block;
margin:10px 0 5px;
font-weight:bold;
}

select,input{
width:90%;
padding:12px;
margin-bottom:10px;
border-radius:6px;
border:none;
background:#000;
color:#FFD700;
font-size:16px;
}

input[type="date"]{
color:#FFD700;
background:#000;
}

/* BOTONES */
button{
background:#D4AF37;
color:#000;
border:none;
padding:12px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
width:90%;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* MENSAJE */
#confirmacao{
display:none;
margin-top:15px;
color:#00ff7f;
font-weight:bold;
}

</style>
</head>

<body>

<!-- LOADER BONITO -->
<div id="loader">
  <img src="https://i.imgur.com/hLIKU5R.jpeg">
  <div class="loader-bar">
    <span></span>
  </div>
</div>

<div class="titulo">ARMANDO BARBER SHOP</div>

<p>Segunda a Sábado<br>8:30–11:30 | 13:00–20:00</p>

<div id="form-container">

<form>

<label>💈 Escolha o Barbeiro</label>

<div class="barbeiros">

<div class="card active" onclick="selecionarBarbeiro('David',this)">
<img src="https://i.imgur.com/QYKPKZ2.jpg">
<span>David</span>
</div>

<div class="card" onclick="selecionarBarbeiro('Armando',this)">
<img src="https://i.imgur.com/JVUmj2q.jpg">
<span>Armando</span>
</div>

</div>

<input type="hidden" id="barbeiro" value="David">

<label>Serviço</label>

<select id="servico">
<option value="Corte">Corte - R$40</option>
<option value="Barba">Barba - R$30</option>
<option value="Sobrancelha">Sobrancelha - R$10</option>
<option value="Corte e Barba">Corte e Barba - R$70</option>
</select>

<label>📅 Data</label>
<input type="date" id="data" required>

<label>⏰ Hora</label>
<select id="hora"></select>

<label>👤 Nome</label>
<input type="text" id="nome" placeholder="Seu nome" required>

<label>📱 WhatsApp</label>
<input type="tel" inputmode="numeric" id="telefone" placeholder="Ex: 95991554792" required>

<button onclick="agendar()">Agendar</button>
<button type="button" onclick="abrirMaps()">📍 Ver localização</button>

</form>

<div id="confirmacao">
Reserva enviada com sucesso! Obrigado por nos preferir.
</div>

</div>

<script>

// LOADER
window.addEventListener("load", ()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },1500);
});

// FECHA MINIMA
window.addEventListener("load", ()=>{
  let hoje=new Date();
  document.getElementById("data").min=hoje.toISOString().split("T")[0];
});

// BARBERO
function selecionarBarbeiro(nome,el){
  document.getElementById("barbeiro").value=nome;
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  carregarHoras();
}

// HORAS
const horas=[
"08:30","09:00","09:30","10:00","10:30","11:00",
"13:00","13:30","14:00","14:30","15:00","15:30",
"16:00","16:30","17:00","17:30","18:00","18:30",
"19:00","19:30","20:00"
];

// CARGAR HORAS
async function carregarHoras(){

let data=document.getElementById("data").value;
let barbeiro=document.getElementById("barbeiro").value;
let select=document.getElementById("hora");
select.innerHTML="";

if(!data)return;

let ocupados=[];

try{
let res=await fetch("https://script.google.com/macros/s/AKfycbztv0Kjze9NPhvUBXgkD0ROj_kvRZOrOq2a9hNkn4tzVIPQ0LB3oT3wFSycJTRRGucn/exec?reservas=1");
let datos=await res.json();

datos.forEach(r=>{
if(r.data===data && r.barbero===barbeiro){
ocupados.push(r.hora);
}
});
}catch(e){}

let ahora=new Date();
let hoy=ahora.toISOString().split("T")[0];
let horaActual=ahora.getHours()+":"+String(ahora.getMinutes()).padStart(2,"0");

horas.forEach(h=>{

let opt=document.createElement("option");
opt.value=h;
opt.text=h;

if(ocupados.includes(h)){
opt.disabled=true;
opt.text=h+" (ocupado)";
}

if(data===hoy && h<=horaActual){
opt.disabled=true;
opt.text=h+" (pasó)";
}

select.add(opt);

});
}

// EVENTO
document.getElementById("data").addEventListener("change",carregarHoras);

// AGENDAR
function agendar(){

let data=document.getElementById("data").value;
let hora=document.getElementById("hora").value;
let nome=document.getElementById("nome").value;
let telefono=document.getElementById("telefone").value;
let barbeiro=document.getElementById("barbeiro").value;

if(!data||!hora||!nome||!telefono){
alert("Completa todo");
return;
}

let texto = 
"Olá Armando Barber Shop%0A%0A" +
"Quero agendar um horário%0A%0A" +
"Barbeiro: " + barbeiro + "%0A" +
"Serviço: " + document.getElementById("servico").value + "%0A" +
"Data: " + data + "%0A" +
"Hora: " + hora + "%0A" +
"Nome: " + nome;

window.open("https://wa.me/5595991554792?text=" + texto);

fetch("https://script.google.com/macros/s/AKfycbztv0Kjze9NPhvUBXgkD0ROj_kvRZOrOq2a9hNkn4tzVIPQ0LB3oT3wFSycJTRRGucn/exec",{
  method:"POST",
  body: JSON.stringify({
    data: data,
    hora: hora,
    cliente: nome,
    telefono: telefone,
    servicio: document.getElementById("servico").value,
    barbero: barbeiro.trim() // 🔥 CLAVE
  })
});

// MAPS
function abrirMaps(){
window.open("https://maps.app.goo.gl/PeCnFTVfxGxvAyP48");
}

</script>

</body>
</html>
