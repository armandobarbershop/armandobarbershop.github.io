<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armando Barber Shop</title>

<style>

/* PANTALLA DE CARGA */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#loader img{
width:280px;
animation:giro 4s linear infinite;
}

@keyframes giro{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.loader-bar{
width:200px;
height:6px;
background:#333;
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

.loader-bar span{
display:block;
height:100%;
width:0%;
background:#D4AF37;
animation:loading 2s forwards;
}

@keyframes loading{
0%{width:0}
100%{width:100%}
}

/* BODY */

body{
font-family:Arial, sans-serif;
background:#000;
color:#ddd;
text-align:center;
padding:20px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

/* TITULO */

.titulo{
font-size:36px;
font-weight:bold;
letter-spacing:4px;
margin-bottom:10px;
background:linear-gradient(90deg,#D4AF37,#fff,#D4AF37);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 4s linear infinite;
}

@keyframes shine{
0%{background-position:-200%}
100%{background-position:200%}
}

/* FORMULARIO */

#form-container{
position:relative;
max-width:420px;
margin:auto;
padding:25px;
border-radius:14px;
background:#111;
box-shadow:0 0 25px rgba(212,175,55,0.25);
overflow:hidden;
}

/* LOGO FONDO */

#form-container::before{
content:"";
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
width:130%;
height:130%;
background-image:url("https://i.imgur.com/hLIKU5R.jpeg");
background-size:contain;
background-repeat:no-repeat;
background-position:center;
opacity:0.10;
z-index:0;
}

#form-container form,
#confirmacao{
position:relative;
z-index:1;
}

/* TARJETAS BARBEROS */

.barbeiros{
display:flex;
justify-content:center;
gap:20px;
margin:10px 0 20px 0;
}

.card{
background:#000;
border-radius:10px;
padding:10px;
width:110px;
cursor:pointer;
transition:0.3s;
border:2px solid transparent;
}

.card img{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
}

.card span{
display:block;
margin-top:6px;
}

.card:hover{
transform:scale(1.05);
}

.card.active{
border:2px solid #D4AF37;
}

/* CAMPOS */

label{
display:block;
margin:10px 0 5px;
font-weight:bold;
}

select,input{
width:90%;
padding:12px;
margin-bottom:10px;
border-radius:6px;
border:none;
background:#000;
color:#FFD700;
font-size:16px;
}

/* CALENDARIO MODERNO */

input[type="date"]{
color:#FFD700;
background:#000;
}

/* BOTONES */

button{
background:#D4AF37;
color:#000;
border:none;
padding:12px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
width:90%;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* MENSAJE */

#confirmacao{
display:none;
margin-top:15px;
color:#00ff7f;
font-weight:bold;
}

</style>
</head>

<body>

<div id="loader">
<img src="https://i.imgur.com/hLIKU5R.jpeg">
<div class="loader-bar"><span></span></div>
</div>

<div class="titulo">ARMANDO BARBER SHOP</div>

<p>Segunda a Sábado<br>8:30–11:30 | 13:00–20:00</p>

<div id="form-container">

<form>

<label>💈 Escolha o Barbeiro</label>

<div class="barbeiros">

<div class="card active" onclick="selecionarBarbeiro('David',this)">
<img src="https://i.imgur.com/QYKPKZ2.jpg">
<span>David</span>
</div>

<div class="card" onclick="selecionarBarbeiro('Armando',this)">
<img src="https://i.imgur.com/JVUmj2q.jpg">
<span>Armando</span>
</div>

</div>

<input type="hidden" id="barbeiro" value="David">

<label>Serviço</label>

<select id="servico">
<option value="Corte">Corte - R$40</option>
<option value="Barba">Barba - R$30</option>
<option value="Sobrancelha">Sobrancelha - R$10</option>
<option value="Corte e Barba">Corte e Barba - R$70</option>
</select>

<label>📅 Data</label>

<input type="date" id="data" required>

<label>⏰ Hora</label>

<select id="hora"></select>

<label>👤 Nome</label>

<input type="text" id="nome" placeholder="Seu nome" required>

<label>📱 WhatsApp</label>

<input type="tel" inputmode="numeric" id="telefone" placeholder="Ex: 95991554792" required>

<button type="button" onclick="agendar()">Reservar</button>

<button type="button" onclick="abrirMaps()">📍 Ver localização</button>

<button type="button" id="installBtn" style="display:none;">📲 Instalar App</button>

</form>

<div id="confirmacao">
Reserva enviada com sucesso! Obrigado por nos preferir.
</div>

</div>

<script>

window.addEventListener("load",function(){
setTimeout(function(){
document.getElementById("loader").style.display="none";
},2000);
});

function selecionarBarbeiro(nome,el){

document.getElementById("barbeiro").value=nome;

document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("active")
})

el.classList.add("active")

}

window.addEventListener("load",function(){

var hoje=new Date();
var dd=String(hoje.getDate()).padStart(2,'0');
var mm=String(hoje.getMonth()+1).padStart(2,'0');
var yyyy=hoje.getFullYear();

document.getElementById("data").min=yyyy+'-'+mm+'-'+dd;

});

var horas=[
"08:30","09:00","09:30",
"10:00","10:30","11:00",
"13:00","13:30","14:00",
"14:30","15:00","15:30",
"16:00","16:30","17:00",
"17:30","18:00","18:30",
"19:00","19:30","20:00"
];

// BLOQUEA HORAS OCUPADAS Y LAS MUESTRA EN GRIS
async function cargarHoras(){

var selectHora=document.getElementById("hora");
selectHora.innerHTML="";

var dataSeleccionada=document.getElementById("data").value;
var barbeiro=document.getElementById("barbeiro").value;

if(!dataSeleccionada ||!barbeiro){
return;
}

// Consulta al Google Sheet las horas ya ocupadas
var ocupadas=[];
try{
let resp=await fetch("https://script.google.com/macros/s/AKfycbyMT7igW6nYz8TanmqHxZo44UPypYpmFN8HSjEjNSALD300tfXE4PBYpBYxkPJMXhP6/exec?fecha="+encodeURIComponent(dataSeleccionada)+"&barbero="+encodeURIComponent(barbeiro));
let dados=await resp.json();
ocupadas = dados;
}catch(e){
console.log("error cargando reservas");
}

var hoje=new Date();
var dataHoje=hoje.toISOString().split("T")[0];
var horaAtual=hoje.getHours();
var minutoAtual=hoje.getMinutes();

for(var i=0;i<horas.length;i++){

var opt=document.createElement("option");
opt.value=horas[i];
opt.text=horas[i];

// Bloquea horas que ya pasaron hoy
if(dataSeleccionada===dataHoje){
var h=parseInt(horas[i].split(":")[0]);
var m=parseInt(horas[i].split(":")[1]);
if(h<horaAtual || (h==horaAtual && m<=minutoAtual)){
opt.disabled=true;
opt.text=horas[i]+" (no disponible)";
}
}

// Bloquea horas ya reservadas
if(ocupadas.includes(horas[i])){
opt.disabled=true;
opt.text=horas[i]+" (ocupado)";
}

selectHora.add(opt);

}

}

// Carga inicial y se refresca cada 30 segundos
cargarHoras();
setInterval(cargarHoras, 30000);

document.getElementById("data").addEventListener("change",cargarHoras);
document.getElementById("barbeiro").addEventListener("change",cargarHoras);

// AGENDAR CON BLOQUEO
async function agendar(){

let data=document.getElementById("data").value;
if(!data){
alert("Selecciona la fecha");
return;
}
let hora=document.getElementById("hora").value;
let nome=document.getElementById("nome").value;
let telefone=document.getElementById("telefone").value;
let barbeiro=document.getElementById("barbeiro").value;
let servico=document.getElementById("servico").value;

if(!data ||!hora ||!nome ||!telefone){
alert("Complete todos los campos");
return;
}

// Si el cliente intenta elegir una hora bloqueada
let selectHora=document.getElementById("hora");
let optionSeleccionada=selectHora.options[selectHora.selectedIndex];
if(optionSeleccionada.disabled){
alert("Esta hora ya está ocupada, elige otra");
cargarHoras();
return;
}

try{

let texto="Olá Armando Barber Shop %0A%0AQuero agendar um horário%0A%0ABarbeiro: "+barbeiro+"%0AServiço: "+servico+"%0AData: "+data+"%0AHora: "+hora+"%0ANome: "+nome;

let numero="5595991554792";
let link="https://wa.me/"+numero+"?text="+texto;
window.open(link,"_blank");

// Guarda la reserva y verifica que nadie la tomó en el mismo segundo
let resp = await fetch("https://script.google.com/macros/s/AKfycbyMT7igW6nYz8TanmqHxZo44UPypYpmFN8HSjEjNSALD300tfXE4PBYpBYxkPJMXhP6/exec",{
  method:"POST",
  headers:{
    "Content-Type":"application/json"
  },
  body: JSON.stringify({
    data: data,
    hora: hora,
    cliente: nome,
    telefone: telefone,
    servicio: servico,
    barbero: barbeiro
  })
});

let r = await resp.json();

if(!r.ok){
  alert(r.msg);
  cargarHoras();
  return;
}

document.getElementById("confirmacao").style.display="block";
setTimeout(cargarHoras,1000);

}catch(e){
alert("Erro ao enviar reserva");
}

}

function abrirMaps(){
window.open("https://maps.app.goo.gl/PeCnFTVfxGxvAyP48");
}

let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").addEventListener("click",()=>{
if(deferredPrompt){
deferredPrompt.prompt();
deferredPrompt.userChoice.then(()=>{
deferredPrompt=null;
});
}
});

</script>
</body>
</html>
