<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Reserva - Armando Barber Shop</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:5px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#c59d5f;
color:black;
font-weight:bold;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#confirmacao{
display:none;
margin-top:20px;
background:#1c1c1c;
padding:15px;
border-radius:5px;
}

</style>
</head>

<body>

<div class="container">

<h2>Reserva tu horario</h2>

<label>Barbero</label>
<select id="barbeiro">
<option value="">Seleccionar</option>
<option value="David">David</option>
<option value="Armando">Armando</option>
</select>

<label>Servicio</label>
<select id="servico">
<option value="Corte">Corte</option>
<option value="Barba">Barba</option>
<option value="Corte + Barba">Corte + Barba</option>
</select>

<label>Fecha</label>
<input type="date" id="data">

<label>Hora</label>
<select id="hora"></select>

<label>Nombre</label>
<input type="text" id="nome">

<label>Teléfono</label>
<input type="tel" id="telefone">

<button onclick="agendar()">Reservar</button>

<div id="confirmacao">
Reserva realizada correctamente.
</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyMT7igW6nYz8TanmqHxZo44UPypYpmFN8HSjEjNSALD300tfXE4PBYpBYxkPJMXhP6/exec";

var horas=[
"08:30","09:00","09:30",
"10:00","10:30","11:00","11:30",
"13:00","13:30","14:00",
"14:30","15:00","15:30",
"16:00","16:30","17:00",
"17:30","18:00","18:30",
"19:00","19:30","20:00"
];

var hoje=new Date();
var dd=String(hoje.getDate()).padStart(2,'0');
var mm=String(hoje.getMonth()+1).padStart(2,'0');
var yyyy=hoje.getFullYear();

document.getElementById("data").min=yyyy+'-'+mm+'-'+dd;

async function cargarHoras(){

let data=document.getElementById("data").value;
let barbeiro=document.getElementById("barbeiro").value;

if(!data||!barbeiro)return;

let select=document.getElementById("hora");
select.innerHTML="";

try{

let res=await fetch(SCRIPT_URL+"?fecha="+data+"&barbero="+barbeiro);
let ocupadas=await res.json();

horas.forEach(h=>{

if(!ocupadas.includes(h)){

let opt=document.createElement("option");
opt.value=h;
opt.text=h;
select.add(opt);

}

});

}catch(err){

console.log(err);

}

}

document.getElementById("data").addEventListener("change",cargarHoras);
document.getElementById("barbeiro").addEventListener("change",cargarHoras);

async function agendar(){

let data=document.getElementById("data").value;
let hora=document.getElementById("hora").value;
let nome=document.getElementById("nome").value;
let telefone=document.getElementById("telefone").value;
let barbeiro=document.getElementById("barbeiro").value;
let servico=document.getElementById("servico").value;

if(!data||!hora||!nome||!telefone||!barbeiro){

alert("Complete todos los campos");
return;

}

try{

await fetch(SCRIPT_URL,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
fecha:data,
hora:hora,
cliente:nome,
telefono:telefone,
servicio:servico,
barbero:barbeiro
})
});

document.getElementById("confirmacao").style.display="block";

cargarHoras();

}catch(err){

alert("Error al reservar");
console.log(err);

}

}

</script>

</body>
</html>
